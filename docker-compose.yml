version: "3"

services:
  database:
    image: postgres:17
    container_name: database
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    command: postgres -c ssl=off
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - app-network

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
    - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
    - app-network

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
    - app-network

volumes:
  postgres-data:

networks:
  app-network: