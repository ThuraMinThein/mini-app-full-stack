events {}

http {
    upstream backend_service {
        server backend:3000;
    }

    server {
        listen 80;
        server_name miniapp.thuraminthein.dev www.miniapp.thuraminthein.dev;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name miniapp.thuraminthein.dev www.miniapp.thuraminthein.dev;

        ssl_certificate /etc/letsencrypt/live/miniapp.thuraminthein.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/miniapp.thuraminthein.dev/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            types {
                application/javascript js;
                text/css css;
            }
            try_files $uri =404;
        }


        location / {
            try_files $uri /index.html;
        }

        location /api/ {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}