events {}

http {

    upstream frontend_service {
        server frontend:80;
    }

    upstream backend_service {
        server backend:3000;
    }

    server {
        listen 80;
        server_name miniapp.thuraminthein.dev www.miniapp.thuraminthein.dev;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name miniapp.thuraminthein.dev www.miniapp.thuraminthein.dev;

        ssl_certificate /etc/letsencrypt/live/miniapp.thuraminthein.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/miniapp.thuraminthein.dev/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Accept-Encoding '';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}